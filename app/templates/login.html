{% extends "base.html" %}
{% block title %}Sign in — Base ID{% endblock %}
{% block content %}
<div class="flex min-h-[calc(100vh-3.5rem)] items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Sign in to Base ID</h1>
      <p class="mt-2 text-sm text-gray-500">Access your account and connected apps</p>
    </div>
    {% if error %}
    <div class="mb-5 rounded-md bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">{{ error }}</div>
    {% endif %}
    <form method="post" action="/auth/login" class="space-y-4 bg-white p-8 rounded-xl shadow-sm border border-gray-200">
      <input type="hidden" name="next" value="{{ next }}" />
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required
               class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="you@example.com" />
      </div>
      <div>
        <div class="flex items-center justify-between mb-1">
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <a href="/auth/forgot-password" class="text-xs text-blue-600 hover:text-blue-700">Forgot password?</a>
        </div>
        <input id="password" name="password" type="password" autocomplete="current-password" required
               class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="••••••••" />
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md text-sm font-medium hover:bg-blue-700 transition-colors">Sign in</button>
    </form>
    <p class="mt-6 text-center text-sm text-gray-500">Don't have an account? <a href="/auth/register" class="text-blue-600 font-medium hover:text-blue-700">Sign up</a></p>
  </div>
</div>
{% endblock %}
