{% extends "base.html" %}
{% block title %}Check your email — Base ID{% endblock %}
{% block content %}
<div class="flex min-h-[calc(100vh-3.5rem)] items-center justify-center px-4 py-12">
  <div class="max-w-md w-full text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-6">
      <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Check your email</h1>
    <p class="text-gray-500 mb-2">We've sent a verification link to <strong class="text-gray-700">{{ email }}</strong>.</p>
    <p class="text-gray-500 text-sm mb-8">After verifying, an admin will review and approve your account.</p>
    <a href="/auth/login" class="text-blue-600 text-sm hover:text-blue-700 font-medium">Back to sign in →</a>
  </div>
</div>
{% endblock %}
