{% extends "base.html" %}
{% block title %}Reset password — Base ID{% endblock %}
{% block content %}
<div class="flex min-h-[calc(100vh-3.5rem)] items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8"><h1 class="text-2xl font-bold text-gray-900">Choose a new password</h1></div>
    {% if done %}
    <div class="rounded-md bg-green-50 border border-green-200 px-4 py-4 text-sm text-green-700 text-center">
      Password updated! <div class="mt-3"><a href="/auth/login" class="text-green-800 font-medium hover:underline">Sign in →</a></div>
    </div>
    {% elif error %}
    <div class="rounded-md bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700 mb-5">{{ error }}</div>
    <p class="text-center text-sm"><a href="/auth/forgot-password" class="text-blue-600 hover:text-blue-700">Request a new reset link</a></p>
    {% else %}
    <form method="post" action="/auth/reset-password" class="space-y-4 bg-white p-8 rounded-xl shadow-sm border border-gray-200">
      <input type="hidden" name="token" value="{{ token }}" />
      <div>
        <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New password</label>
        <input id="new_password" name="new_password" type="password" required autocomplete="new-password"
               class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="At least 8 characters" />
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md text-sm font-medium hover:bg-blue-700 transition-colors">Set new password</button>
    </form>
    {% endif %}
  </div>
</div>
{% endblock %}
